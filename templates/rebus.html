{% extends "layout.html" %}

{% block title %}Rebus{% endblock %}

{% block content %}

<h1>Rebus</h1>

{% for item in puzzle.results %}
    <div>
        {% if item.image %}
            <img src="{{ url_for('static', filename=item.image) }}" width="150">
        {% endif %}
        <p>{{ item.matches }}/{{ item.total }}</p>
    </div>
{% endfor %}

{% endblock %}
