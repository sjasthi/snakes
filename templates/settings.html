{% extends "layout.html" %}

{% block title %}Settings{% endblock %}

{% block content %}

<form method="POST">
    <div class="mb-3">
        <label class="form-label fw-bold">Rebus Type</label>
        <select name="rebus_type" class="form-select">
            <option value="pixabay" {% if rebus_type == "pixabay" %}selected{% endif %}>
                Pixabay Rebus
            </option>
            <option value="classic" {% if rebus_type == 'classic' %}selected{% endif %}>
                HuuggingFace Rebus
            </option>
        </select>
    </div>

    <button type="submit" class="btn btn-primary">Save Settings</button>
</form>

{% endblock %}
